# =============================================================================
# Grafana Custom Configuration - Your Company
# =============================================================================
# Este arquivo é mesclado com o grafana.ini padrão durante o build da imagem
# =============================================================================

# -----------------------------------------------------------------------------
# Branding
# -----------------------------------------------------------------------------
[white_labeling]
# Requer Grafana Enterprise para customização completa
# Configurações abaixo funcionam em versão OSS

# -----------------------------------------------------------------------------
# Server
# -----------------------------------------------------------------------------
[server]
# Personaliza o título da página do navegador
app_title = Your Company | Observability Hub

# -----------------------------------------------------------------------------
# Auth
# -----------------------------------------------------------------------------
[auth]
# Texto exibido no formulário de login
login_hint = admin@yourorg.com.br
# Não mostrar o subtítulo do login
disable_login_form = false

# Subtítulo da página de login
[auth.basic]
enabled = true

# -----------------------------------------------------------------------------
# Security
# -----------------------------------------------------------------------------
[security]
# Desabilitar gravatar (usa avatar local)
disable_gravatar = true
# Dias para lembrar login
login_remember_days = 7

# -----------------------------------------------------------------------------
# Users
# -----------------------------------------------------------------------------
[users]
# Valor padrão para o tema
default_theme = dark
# Página inicial após login
home_page =
# Permitir que usuários alterem o tema
allow_org_create = false
allow_sign_up = false

# -----------------------------------------------------------------------------
# Unified Alerting
# -----------------------------------------------------------------------------
[unified_alerting]
enabled = true

# -----------------------------------------------------------------------------
# Alerting
# -----------------------------------------------------------------------------
[alerting]
enabled = false

# -----------------------------------------------------------------------------
# Explore
# -----------------------------------------------------------------------------
[explore]
enabled = true

# -----------------------------------------------------------------------------
# Help
# -----------------------------------------------------------------------------
[help]
enabled = true

# -----------------------------------------------------------------------------
# Plugins
# -----------------------------------------------------------------------------
[plugins]
enable_alpha = false

# -----------------------------------------------------------------------------
# Feature Toggles (Grafana 10+)
# -----------------------------------------------------------------------------
[feature_toggles]
# Habilitar novo visual da página de login
newTraceViewHeader = true

# -----------------------------------------------------------------------------
# Date Formats
# -----------------------------------------------------------------------------
[date_formats]
# Formato de data padrão Brasil
full_date = DD/MM/YYYY HH:mm:ss
interval_second = HH:mm:ss
interval_minute = HH:mm
interval_hour = DD/MM HH:mm
interval_day = DD/MM
interval_month = MM/YYYY
interval_year = YYYY
