global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: prod
    cluster: teck-obs-hub

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager.observability.local:9093

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'grafana'
    static_configs:
      - targets: ['grafana.observability.local:3000']
    metrics_path: /metrics

  - job_name: 'alertmanager'
    static_configs:
      - targets: ['alertmanager.observability.local:9093']

  - job_name: 'loki'
    static_configs:
      - targets: ['loki.observability.local:3100']

  - job_name: 'tempo'
    static_configs:
      - targets: ['tempo.observability.local:3200']

  - job_name: 'alloy'
    static_configs:
      - targets: ['otel.observability.local:12345']

  # LiteLLM — token/cost/latency metrics per model/provider
  - job_name: 'litellm'
    metrics_path: '/metrics'
    scrape_interval: 30s
    static_configs:
      - targets: ['litellm.observability.local:4000']
